services:
  clock-simulator:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: clock-simulator
    ports:
      - "5000:5000"  # Rust API & WebSocket
      - "5173:5173"  # React Dev Server
    volumes:
      # Mount the actual source code from the parent directories
      - ../backend:/app/backend
      - ../webapp:/app/webapp

      # Persistence for speed:
      # 1. Anonymous volume for node_modules so the container manages its own deps
      - /app/webapp/node_modules
      # 2. Named volume for cargo registry so you don't redownload crates
      - cargo-cache:/usr/local/cargo/registry
      # 3. Named volume for target folder so you don't recompile from scratch
      - rust-target:/app/backend/target

    working_dir: /app
    networks:
      - clock-network

volumes:
  cargo-cache:
  rust-target:

networks:
  clock-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-clock
    ipam:
      config:
        - subnet: 10.5.0.0/16
          ip_range: 10.5.0.0/24
